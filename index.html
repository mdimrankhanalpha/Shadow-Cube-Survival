<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Cube Survival</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Shadow Cube Survival</h1>

<div class="info">Score: <span id="score">0</span></div>

<canvas id="gameCanvas"></canvas>

<!-- GAME OVER SCREEN -->
<div id="gameOverBox">
    <h2>Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Replay</button>
</div>

<p>Move: WASD / Arrow Keys</p>

<script src="script.js"></script>
</body>
</html>
